name: Latest blog post workflow
on:
  schedule:
    # Runs every day at 12:00 PM UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  update-readme:
    name: Update README with latest Dev.to posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # <-- UPDATED from v2 to v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # CHANGE THIS TO YOUR CORRECT DEV.TO USERNAME
          feed_list: "https://dev.to/feed/Navin Kukreja"
          comment_tag_name: "BLOG-POST-LIST"
          max_post_count: 4
